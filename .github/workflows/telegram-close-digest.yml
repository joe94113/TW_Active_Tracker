name: Send Close Notifications

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-close-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Refresh digest data snapshot
        run: npm run data:update || echo "data:update completed with partial upstream failures"

      - name: Send Telegram digest
        run: node scripts/send-telegram-brief.mjs

      - name: Send Discord digest
        run: node scripts/send-discord-brief.mjs
