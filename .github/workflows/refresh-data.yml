name: Refresh Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 1-6 * * 1-5'
    - cron: '50 6 * * 1-5'
    - cron: '20 7 * * 1-5'
    - cron: '35 10 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-market-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update static market data
        run: npm run data:update

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: refresh market data"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: refresh
    if: needs.refresh.outputs.data_changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
