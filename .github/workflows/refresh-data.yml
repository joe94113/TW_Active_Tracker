name: Refresh Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 1-6 * * 1-5'
    - cron: '50 6 * * 1-5'
    - cron: '20 7 * * 1-5'
    - cron: '35 10 * * 1-5'

permissions:
  pages: write
  id-token: write

concurrency:
  group: refresh-market-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    outputs:
      data_changed: ${{ steps.detect.outputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update static market data
        run: npm run data:update

      - name: Detect refreshed data changes
        id: detect
        run: |
          if git diff --quiet -- public/data; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build site
        if: steps.detect.outputs.changed == 'true'
        run: npm run build

      - name: Setup Pages
        if: steps.detect.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: refresh
    if: needs.refresh.outputs.data_changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  notify-close:
    needs:
      - refresh
      - deploy
    if: needs.refresh.outputs.data_changed == 'true' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '35 10 * * 1-5')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh digest data snapshot
        run: npm run data:update || echo "data:update completed with partial upstream failures"

      - name: Send Telegram digest
        run: node scripts/send-telegram-brief.mjs

      - name: Send Discord digest
        run: node scripts/send-discord-brief.mjs

      - name: Send LINE digest
        run: node scripts/send-line-brief.mjs
